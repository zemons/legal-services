# ============================================================
# LAW CASE MANAGEMENT — จัดการคดี
# ============================================================

- name: Odoo Law Management System (Webkul)
  url: https://apps.odoo.com/apps/modules/18.0/wk_law_management
  version: "18.0"
  price: $96.95
  license: Proprietary
  developer: Webkul Software Pvt. Ltd.
  relevance: high
  notes: >
    ครบสุด: case, trial, court, judge, evidence, lawyer, dashboard
    มี model structure ที่น่าศึกษา — trial/hearing, evidence, billing
    เทียบกับ legal_case ของเรา: เพิ่ม trial mgmt, evidence mgmt, legal billing

- name: Legal Case Management (Cybrosys)
  url: https://apps.odoo.com/apps/modules/18.0/legal_case_management
  version: "18.0"
  license: LGPL-3
  developer: Cybrosys Techno Solutions
  code_lines: 2457
  depends: [contacts, mail, hr, account, website]
  relevance: high
  notes: >
    LGPL-3 (open source แก้ไขได้!) — ข้อได้เปรียบเหนือ Webkul (Proprietary)
    Features: access control (admin/lawyer/clerk), lawyer wages,
    case registration (backend + portal), evidence & trial tracking,
    invoicing 4 แบบ (per-trial, per-case, settlement, full),
    portal client self-service, reports (evidence, case progress)
    depends website — ตรงกับ project เราที่ใช้ website module สำหรับ LIFF
    น่าศึกษา model structure เพื่อปรับเข้ากับ legal_case module ของเรา

- name: Law & Legal Practice Management (BrowseInfo)
  url: https://apps.odoo.com/apps/modules/17.0/bi_law_management
  version: "17.0"
  license: Proprietary
  relevance: medium
  notes: คล้าย wk_law_management — ยังไม่มี 18.0

- name: Law Management System (DevIntelle)
  url: https://apps.odoo.com/apps/modules/17.0/dev_law_management
